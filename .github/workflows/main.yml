name: Deploy to docs

on:
  push:
    branches:
      - main
  workflow_dispatch: # 新增手动触发
    inputs: # 可选：定义手动输入参数
      environment:
        description: 'Deploy Environment'
        required: false
        default: 'manual or remote trigger'

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Copy main navigation files
        run: |
          cp docs/.vitepress/theme/navbar/en.main.ts docs/.vitepress/theme/navbar/en.ts
          cp docs/.vitepress/theme/navbar/zh.main.ts docs/.vitepress/theme/navbar/zn.ts

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: rsync deployments
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: docs/.vitepress/dist/*
          remote_path: ${{ vars.DEPLOY_PATH }}
          remote_host: ${{ vars.DEPLOY_HOST }}
          remote_port: ${{ vars.DEPLOY_PORT }}
          remote_user: ${{ vars.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Refresh CDN
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ vars.DEPLOY_PORT }}
          script: |
            bash /root/tools/refresh_cdn/refresh_docs.sh

  deploy-global:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Copy global navigation files
        run: |
          cp docs/.vitepress/theme/navbar/en.global.main.ts docs/.vitepress/theme/navbar/en.ts
          cp docs/.vitepress/theme/navbar/zh.global.main.ts docs/.vitepress/theme/navbar/zh.ts

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: rsync deployments
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: docs/.vitepress/dist/*
          remote_path: ${{ vars.GLOBAL_DEPLOY_PATH }}
          remote_host: ${{ vars.DEPLOY_HOST }}
          remote_port: ${{ vars.DEPLOY_PORT }}
          remote_user: ${{ vars.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Refresh CDN
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ vars.DEPLOY_PORT }}
          script: |
            bash /root/tools/refresh_cdn/refresh_docs.sh
